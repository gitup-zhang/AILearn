version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ailearn-postgres
    environment:
      POSTGRES_USER: ailearn
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ailearn
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ailearn"]
      interval: 5s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    container_name: ailearn-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma

volumes:
  postgres_data:
  chroma_data:
